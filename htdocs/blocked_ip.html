<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Blocked IP</title>
	<style>
	html, body {
		height: 100%;
		width: 100%;
		margin: 0;
		padding: 0;
		font-family: Verdana, Geneva, sans-serif;
		background-color: #f9f9f9;
		color: #333;
		display: flex;
		justify-content: center;
		align-items: flex-start;
		text-align: center;
	}

	.page-wrapper {
		display: flex;
		flex-direction: column;
		align-items: center;
		margin-top: 40px;
		width: 100%;
		max-width: 600px;
		padding: 0 16px;
		box-sizing: border-box;
	}

	h1 {
		font-size: 48px;
		color: #cc0000;
		margin-bottom: 16px;
		line-height: 1.2;
	}

	p {
		font-size: 18px;
		margin: 8px 0;
	}


	@media (max-width: 600px) {
		h1 { font-size: 36px; }
		p { font-size: 16px; }
		.page-wrapper { margin-top: 20px; }
	}
	</style>
</head>
<body>
	<div class="page-wrapper">
		<h1>Blocked IP</h1>
		<p>Your IP is blocked.</p>
		<p>Go away!</p>
	</div>
</body>
</html>
