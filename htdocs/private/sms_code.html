<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Login page - SMS Code</title>
	<style>
	body {
		font-family: Verdana, sans-serif;
		background: #f9f9f9;
		color: #333;
		text-align: center;
		margin-top: 40px;
	}
	b {
		display: block;
		font-size: 24px;
		margin-bottom: 16px;
	}
	input[type="number"] {
		font-size: 18px;
		padding: 12px;
		border: 1px solid #ccc;
		border-radius: 4px;
		text-align: center;
		display: block;
		margin: 0 auto 16px;
		width: 260px;
	}
	label {
		display: block;
		font-size: 16px;
		margin-bottom: 20px;
		cursor: pointer;
	}
	input[type="checkbox"] {
		margin-right: 8px;
		transform: scale(1.2);
		vertical-align: middle;
	}
	/* Scales the button up while forcing the native system look */
	input[type="submit"] {
		font-size: 20px;
		width: 140px;
		height: 44px;
	}
	</style>
</head>
<body>
	<form method="POST" action="">
		<b>SMS Code</b>
		<input type="number" name="sms_code" id="sms_code" inputmode="numeric" pattern="[0-9]*" autofocus autocomplete="one-time-code">
		
		<label>
			<input type="checkbox" name="stay_logged_in" value="true" checked>Stay Logged in
		</label>

		<input type="submit" name="login" value="Login">
	</form>
</body>
</html>
