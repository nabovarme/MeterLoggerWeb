<!DOCTYPE html>
<html>
<head>
	<meta charset="UTF-8">
	<title>MeterLogger Firmware Flash Tool</title>

	<link rel="stylesheet" href="/css/menu.css" />
	<script src="/js/menu.js.epl" defer></script>

	<script type="module"
		src="https://unpkg.com/esp-web-tools@latest/dist/web/install-button.js">
	</script>
	<link rel="stylesheet" href="default.css">

	<style>
		/* Global layout and defaults */
		html, body {
			height: 100%;
			margin: 0;
			padding: 0;
			font-family: Verdana, Geneva, sans-serif;
			font-size: 100%;
			overflow-x: hidden; /* Prevent horizontal scroll */
		}

		.top {
			position: absolute;
			top: 0;
			left: 0;
		}
		.default {
			font-family: Verdana, Geneva, sans-serif;
			font-size: 100%
		}
		.default-bold {
			font-family: Verdana, Geneva, sans-serif;
			font-weight: bold;
		}
		.default-small {
			font-family: Verdana, Geneva, sans-serif;
			font-size: 60%;
		}
		.default-group {
			font-family: Verdana, Geneva, sans-serif;
			font-weight: bold;
			font-size: 120%;
		}

		.nowrap {
			white-space: nowrap;
		}

		/* High-performance hiding utility that bypasses layout recalculation */
		.hidden {
			display: none !important;
		}

		/* Expanded wrapper width configuration */
		.firmware-wrapper {
			padding: 10px;
			width: 100%;
			max-width: 600px; /* Made wider to prevent longer firmware names from cutting off */
			box-sizing: border-box;
		}

		/* Completely unstyled, native default input layout sizing */
		.firmware-wrapper input[type="search"] {
			width: 100%;
			padding: 6px;
			font-family: Verdana, Geneva, sans-serif;
			box-sizing: border-box;
		}
	</style>
</head>

<body>
	<div class="header default-group" style="padding: 10px 10px 0 10px;">MeterLogger Firmware Flash Tool</div>

	<div class="firmware-wrapper">
		<label for="searchField" class="default-bold" style="display: block; margin-bottom: 5px;">Select firmware:</label>
		<input type="search" id="searchField" list="firmwareOptions" placeholder="Click or type to search firmware..." autocomplete="off" disabled>
		
		<datalist id="firmwareOptions"></datalist>
	</div>

	<select id="firmwareSelect" class="hidden">
		<option value="">Loading...</option>
	</select>

	<div style="padding: 0 10px 10px 10px;">
		<esp-web-install-button id="installBtn" manifest="" erase="true">
			<button slot="activate" class="default" style="padding: 6px 12px; cursor: pointer;">Flash Device</button>
		</esp-web-install-button>
	</div>

	<script>
		const searchInput = document.getElementById('searchField');
		const datalist = document.getElementById('firmwareOptions');
		const select = document.getElementById('firmwareSelect');
		const button = document.getElementById('installBtn');

		// Store the complete firmware list globally for filtering
		let allFirmwares = [];
		let selectedFirmware = null;

		// Rebuild the options list inside the native datalist element
		function populateDatalist(list) {
			datalist.innerHTML = '';
			list.forEach(fw => {
				const opt = document.createElement('option');
				opt.value = fw.name;
				datalist.appendChild(opt);
			});
		}

		// Fetch firmware list from the server
		fetch('firmware/firmwares.json')
			.then(res => res.json())
			.then(list => {

				// Sort firmware list by name (alphabetically)
				list.sort((a, b) => a.name.localeCompare(b.name));

				// Save the sorted list and enable the search input
				allFirmwares = list;
				searchInput.disabled = false;

				// Clear dropdown
				select.innerHTML = '';

				// Populate dropdown with sorted firmware entries
				populateDatalist(allFirmwares);

				// Set default underlying manifest selection, but keep field display visually empty on load
				if (list.length > 0) {
					button.setAttribute('manifest', 'firmware/' + list[0].path);
				}
			})
			.catch(err => {
				console.error('Failed to load firmware list', err);
			});

		// Listen for inputs to capture validation matches instantly
		searchInput.addEventListener('input', () => {
			const currentVal = searchInput.value;
			const matched = allFirmwares.find(fw => fw.name === currentVal);

			if (matched) {
				selectedFirmware = matched;
				button.setAttribute('manifest', 'firmware/' + matched.path);
			}
		});

		// Force the browser's native pull-down menu to open instantly on clean click interactions
		searchInput.addEventListener('click', () => {
			searchInput.value = ''; // Clear text context to guarantee all native options display on click
		});

		// Safety check to restore the active selection label if left blank or incomplete on blur cycles
		searchInput.addEventListener('blur', () => {
			setTimeout(() => {
				if (selectedFirmware) {
					searchInput.value = selectedFirmware.name;
				} else if (searchInput.value === '' && allFirmwares.length > 0) {
					// Default fallback visual representation matching the initial auto-selected index configuration
					button.setAttribute('manifest', 'firmware/' + allFirmwares[0].path);
				}
			}, 150);
		});

		// Update manifest when user selects a different firmware
		select.addEventListener('change', () => {
			button.setAttribute('manifest', select.value);
		});
	</script>

</body>
</html>
