<VirtualHost *:80>

	ServerName localhost
	ServerAdmin webmaster@localhost

	DocumentRoot /var/www/html

	# --- mod_perl exporter (global handler) ---
	PerlModule Nabovarme::PrometheusExporter

	SetHandler modperl
	PerlResponseHandler Nabovarme::PrometheusExporter

	# --- Global no-cache headers (ALL URLs) ---
	Header always set Content-Type "text/plain; version=0.0.4; charset=utf-8"
	Header always set Cache-Control "no-store, no-cache, must-revalidate, max-age=0"
	Header always set Pragma "no-cache"

	# --- Logging ---
	ErrorLog ${APACHE_LOG_DIR}/error.log
	CustomLog ${APACHE_LOG_DIR}/access.log combined

	# --- Security (optional but now important) ---
	<Directory />
		Options None
		AllowOverride None
		Require all granted
	</Directory>

</VirtualHost>
